<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Comercial · A5 Ecossistema</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07060f;
  --surface:#0f0d1c;
  --surface2:#161428;
  --border:rgba(255,255,255,0.07);
  --border-glow:rgba(107,47,224,0.35);
  --purple:#7B3FF5;
  --purple-bright:#9B6BFF;
  --purple-dim:rgba(107,47,224,0.12);
  --text:#f2eeff;
  --muted:#8a85a0;
  --accent:#c4b0ff;
  --green:#4ade80;
  --yellow:#fbbf24;
  --red:#f87171;
  --blue:#60a5fa;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{
  background:rgba(10,7,22,0.98);
  border-right:1px solid var(--border);
  padding:1.75rem 1.25rem;
  display:flex;flex-direction:column;gap:2px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem;}
.logo svg{filter:drop-shadow(0 0 8px rgba(107,47,224,0.8));}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem;line-height:1.2;}
.logo-sub{font-size:10px;color:var(--muted);font-weight:400;}
.nav-section{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:1.25rem 10px 6px;opacity:.6;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.05);}
.nav-item.active{color:var(--text);background:var(--purple-dim);border:1px solid var(--border-glow);}
.nav-item svg{flex-shrink:0;opacity:.6;}
.nav-item.active svg{opacity:1;}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{
  background:rgba(10,7,22,0.95);
  border-bottom:1px solid var(--border);
  padding:.9rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);
  gap:1rem;flex-wrap:wrap;
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* selects */
.sel-wrap{position:relative;}
.sel-wrap select{
  appearance:none;-webkit-appearance:none;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:7px 30px 7px 12px;font-size:12px;color:var(--text);
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:border-color .15s;
}
.sel-wrap select:focus{outline:none;border-color:var(--purple);}
.sel-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted);pointer-events:none;}

/* mês (multi-seleção) */
.mes-dropdown{position:relative;}
.mes-dropdown-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;font-size:12px;color:var(--text);
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:border-color .15s;
}
.mes-dropdown-btn:hover{border-color:var(--border-glow);}
.mes-dropdown-panel{
  position:absolute;top:calc(100% + 6px);right:0;min-width:220px;
  background:var(--surface2);border:1px solid var(--border-glow);border-radius:10px;
  padding:.6rem;z-index:100;box-shadow:0 12px 30px rgba(0,0,0,.4);
  display:none;max-height:340px;overflow-y:auto;
}
.mes-dropdown-panel.open{display:block;}
.mes-dropdown-actions{display:flex;gap:6px;margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
.mes-dropdown-actions button{
  flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:11px;padding:5px 6px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;
}
.mes-dropdown-actions button:hover{background:rgba(255,255,255,.1);}
.mes-dropdown-item{
  display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;
  font-size:12.5px;color:var(--text);transition:background .15s;
}
.mes-dropdown-item:hover{background:rgba(255,255,255,.06);}
.mes-dropdown-item input{accent-color:var(--purple);cursor:pointer;}

.btn-refresh{background:var(--purple);border:none;border-radius:8px;padding:7px 14px;color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-refresh:hover{background:var(--purple-bright);transform:translateY(-1px);}
.btn-refresh.spinning svg{animation:spin 1s linear infinite;}
.last-sync{font-size:10px;color:var(--muted);}

/* ── CONTENT ── */
.content{padding:1.75rem 2rem;flex:1;}
.page{display:none;animation:fadeUp .3s ease forwards;}
.page.active{display:block;}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:1.2rem;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent);}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.stat-value{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;line-height:1;}
.stat-value.green{color:var(--green);}
.stat-value.yellow{color:var(--yellow);}
.stat-value.red{color:var(--red);}
.stat-value.purple{color:var(--purple-bright);}
.stat-value.blue{color:var(--blue);}
.stat-sub{font-size:10.5px;color:var(--muted);margin-top:5px;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(155,107,255,.35),transparent);}
.card-title{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:1rem;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* ── META CARD ── */
.meta-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem;}
.meta-values{font-size:13px;color:var(--muted);}
.meta-values strong{color:var(--text);font-weight:600;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;}
.b-green{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3);}
.b-yellow{background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid rgba(251,191,36,.3);}
.b-red{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.b-blue{background:rgba(96,165,250,.15);color:var(--blue);border:1px solid rgba(96,165,250,.3);}
.b-purple{background:var(--purple-dim);color:var(--purple-bright);border:1px solid var(--border-glow);}

.pb{background:rgba(255,255,255,.06);border-radius:99px;height:8px;overflow:hidden;margin:8px 0;}
.pf{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.22,1,.36,1);}

.meta-sub{font-size:11px;color:var(--muted);margin-top:4px;}

.meta-input-row{display:flex;align-items:center;gap:8px;margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border);}
.meta-input-row label{font-size:11px;color:var(--muted);}
.meta-input-row input{
  background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  padding:5px 9px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;width:120px;
}
.meta-input-row input:focus{outline:none;border-color:var(--purple);}

/* ── SPRINTS ── */
.sprint-row{display:grid;grid-template-columns:90px 1fr 90px 80px;gap:10px;align-items:center;margin-bottom:10px;}
.sprint-lbl{font-size:12px;color:var(--muted);}
.sprint-val{font-size:13px;font-weight:600;text-align:right;}

.sprint-block{margin-bottom:1.5rem;}
.sprint-block:last-child{margin-bottom:0;}
.sprint-block-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 8px;margin:0 -8px .6rem;border-radius:8px;transition:background .15s;user-select:none;}
.sprint-block-header:hover{background:rgba(255,255,255,.04);}
.sprint-block-header-left{display:flex;align-items:center;gap:8px;}
.sprint-block-title{font-size:11px;font-weight:700;color:var(--accent);font-family:'Syne',sans-serif;}
.sprint-block-chevron{transition:transform .2s;color:var(--muted);flex-shrink:0;}
.sprint-block-chevron.collapsed{transform:rotate(-90deg);}
.sprint-block-summary{font-size:10px;color:var(--muted);}
.sprint-block-body{overflow:hidden;transition:max-height .25s ease, opacity .2s ease;}
.sprint-block-body.collapsed{max-height:0!important;opacity:0;pointer-events:none;}

/* ── FUNIL ── */
.funil-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.funil-lbl{font-size:11px;color:var(--muted);width:85px;flex-shrink:0;text-align:right;}
.funil-wrap{flex:1;background:rgba(255,255,255,.05);border-radius:99px;height:26px;overflow:hidden;}
.funil-fill{height:100%;border-radius:99px;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:600;min-width:30px;transition:width .8s cubic-bezier(.22,1,.36,1);}
.funil-pct{font-size:11px;color:var(--muted);width:36px;text-align:right;flex-shrink:0;}

/* ── BARS ── */
.bar-item{margin-bottom:10px;}
.bar-head{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;}
.bar-val{font-weight:600;color:var(--text);font-family:'Syne',sans-serif;}

/* ── TABELA ── */
.tbl-wrap{overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.tbl td{font-size:12.5px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);vertical-align:top;}
.tbl tr:hover td{background:rgba(255,255,255,.02);}
.tbl td.muted{color:var(--muted);}

/* ── HIST SEARCH ── */
.search-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.search-row input{
  background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:8px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;width:220px;
}
.search-row input:focus{outline:none;border-color:var(--purple);}
.search-row input::placeholder{color:var(--muted);}

/* ── CLIENTES DETAIL ── */
.cli-grid{display:grid;grid-template-columns:260px 1fr;gap:14px;align-items:start;}
.cli-list{display:flex;flex-direction:column;gap:6px;max-height:70vh;overflow-y:auto;padding-right:4px;}
.cli-list::-webkit-scrollbar{width:3px;}
.cli-list::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;}
.cli-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;cursor:pointer;transition:all .15s;}
.cli-item:hover{border-color:var(--border-glow);background:var(--purple-dim);}
.cli-item.active{border-color:var(--purple);background:var(--purple-dim);}
.cli-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.cli-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.cli-val{font-size:12px;font-weight:600;color:var(--green);margin-top:3px;}
.detail-card{background:var(--surface);border:1px solid var(--border-glow);border-radius:14px;padding:1.4rem;}
.detail-row{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.detail-row:last-child{border:none;margin:0;padding:0;}
.detail-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;}
.detail-value{font-size:13px;color:var(--text);line-height:1.6;}

/* ── LOADING / EMPTY ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 1rem;gap:1rem;}
.spinner{width:40px;height:40px;border:2px solid rgba(155,107,255,.2);border-top-color:var(--purple-bright);border-radius:50%;animation:spin .9s linear infinite;}
.loading-txt{font-family:'Syne',sans-serif;font-size:13px;color:var(--muted);}
.empty{text-align:center;padding:4rem 1rem;}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4;}
.empty-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;color:var(--muted);}
.empty-sub{font-size:12px;color:var(--muted);opacity:.7;margin-top:.4rem;}

/* ── SECTION TITLE ── */
.section-title{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin:1.5rem 0 .75rem;}

/* ── DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:95vw;background:var(--surface);border-left:1px solid var(--border-glow);z-index:201;transform:translateX(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;}
.drawer.open{transform:translateX(0);}
.drawer-header{padding:1.4rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-shrink:0;}
.drawer-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;}
.drawer-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.drawer-close{background:rgba(255,255,255,.07);border:none;border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);flex-shrink:0;transition:all .15s;}
.drawer-close:hover{background:rgba(255,255,255,.12);color:var(--text);}
.drawer-body{flex:1;overflow-y:auto;padding:1rem 1.5rem;}
.drawer-body::-webkit-scrollbar{width:3px;}
.drawer-body::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;}
.drawer-card{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:1rem 1.1rem;margin-bottom:.7rem;cursor:pointer;transition:border-color .15s;}
.drawer-card:hover{border-color:var(--border-glow);}
.drawer-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}
.drawer-card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;}
.drawer-card-val{font-weight:700;color:var(--green);font-family:'Syne',sans-serif;}
.drawer-card-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:.3rem;}
.drawer-tag{font-size:10px;color:var(--muted);background:rgba(255,255,255,.05);border-radius:4px;padding:2px 7px;}
.drawer-expanded{margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.drawer-field{font-size:11px;}
.drawer-field-label{color:var(--muted);margin-bottom:2px;font-size:9px;text-transform:uppercase;letter-spacing:.08em;}
.drawer-field-value{color:var(--text);line-height:1.5;}

/* clickable rows/bars */
.clickable-row{cursor:pointer;transition:all .15s;}
.clickable-row:hover td{background:rgba(155,107,255,.08)!important;}
.clickable-row:hover td:first-child{color:var(--purple-bright);}
.bar-item.clickable{cursor:pointer;padding:4px 6px;border-radius:7px;margin-left:-6px;margin-right:-6px;transition:background .15s;}
.bar-item.clickable:hover{background:rgba(155,107,255,.08);}
.stat-card.clickable{cursor:pointer;transition:all .2s;}
.stat-card.clickable:hover{border-color:var(--border-glow);transform:translateY(-2px);}

@media(max-width:900px){
  .shell{grid-template-columns:1fr;}
  .sidebar{height:auto;position:relative;flex-direction:row;flex-wrap:wrap;padding:1rem;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .grid2,.grid3{grid-template-columns:1fr;}
  .cli-grid{grid-template-columns:1fr;}
  .sprint-row{grid-template-columns:70px 1fr 70px 70px;}
  .drawer{width:100vw;}
}
</style>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="drawer-title">—</div>
      <div class="drawer-sub" id="drawer-sub">—</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>
</head>

<div class="shell">

<aside class="sidebar">

    <div class="logo-text">A5 Ecossistema<span class="logo-sub" style="display:block">Comercial Dashboard</span></div>
  </div>

  <div class="nav-section">Visão Geral</div>

// ── FETCH ─────────────────────────────────────────────────────────
// Regex to detect a monetary value cell (R$ or number with comma/dot pattern)
const RE_MONEY = /R\$|^\s*\d{1,3}([.,]\d{3})*([.,]\d{2})?\s*$/;
const RE_PHONE = /^\d[\d\s\-().]{6,}$/;
const RE_EMAIL = /@/;
const RE_CANAL = /org[aâ]nico|prospec|indica|meta|google|whats/i;
const SKIP_NAME = /^(exemplo|nome|total|r\$|\d+$)/i;

async function fetchSheetRaw(sheetId, sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res  = await fetch(url);
  const text = await res.text();
  let json;
  try {
    json = JSON.parse(text.replace(/^[^(]+\(/,'').replace(/\);\s*$/,''));
  } catch(e) {
    return null; // resposta não era JSON válido (aba não encontrada, etc.)
  }
  if(json.status === 'error') return null;
  if(!json.table || !json.table.rows || !json.table.rows.length) return null;
  return json;
}

// Busca por "gid" (id numérico da aba) em vez de nome. Diferente do "sheet="
// por nome, um gid inválido dá erro de verdade — nada de fallback silencioso
// pra primeira aba da planilha. É o jeito confiável de garantir que o mês
// certo seja puxado.
async function fetchSheetByGid(sheetId, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=${encodeURIComponent(gid)}`;
  const res  = await fetch(url);
  const text = await res.text();
  let json;
  try {
    json = JSON.parse(text.replace(/^[^(]+\(/,'').replace(/\);\s*$/,''));
  } catch(e) {
    return null;
  }
  if(json.status === 'error') return null;
  if(!json.table || !json.table.rows || !json.table.rows.length) return null;
  return json;
}

// PROTEÇÃO GENÉRICA CONTRA O FALLBACK SILENCIOSO DO GOOGLE:
// se você pede uma aba por nome que não existe, o Google não dá erro — ele
// devolve por engano os dados da PRIMEIRA aba da planilha. Pra pegar isso
// sem precisar saber de antemão quais meses cada vendedor tem, a gente
// busca (uma vez por planilha, com cache) um nome de aba propositalmente
// inexistente — o que quer que volte disso É a tal "primeira aba" (o
// fallback). Depois, ao buscar um mês de verdade, se o resultado for
// idêntico a esse fallback, tratamos como "esse mês não existe" em vez de
// mostrar dado errado.
const FALLBACK_SIG_CACHE = {};
function sigDeTabela(json) {
  return JSON.stringify((json && json.table && json.table.rows) || []);
}
async function getFallbackSignature(sheetId) {
  if(FALLBACK_SIG_CACHE[sheetId] !== undefined) return FALLBACK_SIG_CACHE[sheetId];
  let sig = null;
  try {
    const json = await fetchSheetRaw(sheetId, '__A5_PROBE_ABA_INEXISTENTE__');
    sig = json ? sigDeTabela(json) : null;
  } catch(e) {
    sig = null;
  }
  FALLBACK_SIG_CACHE[sheetId] = sig;
  return sig;
}

async function fetchSheet(vd, sheetName) {
  const sheetId = vd.id;

  // 1) Se esse vendedor tem o gid dessa aba configurado, usa ele — é
  //    100% confiável, sem risco de puxar o mês errado.
  const gid = vd.gids && vd.gids[sheetName];
  if(gid) {
    let json = null;
    try { json = await fetchSheetByGid(sheetId, gid); } catch(e) { json = null; }
    if(json) return parseSheetJson(json);
    return [];
  }

  // 2) Sem gid: tenta pelo nome (com variações comuns de grafia), mas
  //    descarta qualquer resposta que seja idêntica ao "fallback" (ou seja,
  //    que não bateu de verdade com o mês pedido — o Google só devolveu a
  //    primeira aba da planilha por engano).
  const fallbackSig = await getFallbackSignature(sheetId);
  const variantes = [sheetName, ...(MES_VARIANTES[sheetName] || [])];
  const tentadas = new Set();
  let json = null;
  for(const nomeTentativa of variantes) {
    if(tentadas.has(nomeTentativa)) continue;
    tentadas.add(nomeTentativa);
    let candidato = null;
    try {
      candidato = await fetchSheetRaw(sheetId, nomeTentativa);
    } catch(e) {
      candidato = null;
    }
    if(candidato && fallbackSig !== null && sigDeTabela(candidato) === fallbackSig) {
      candidato = null; // era só o fallback do Google, não a aba pedida de verdade
    }
    if(candidato) { json = candidato; break; }
  }
  if(!json) return []; // esse mês não existe (ou está vazio) pra esse vendedor — ignora, sem misturar
  return parseSheetJson(json);
}

function parseSheetJson(json) {

  const colLabels = json.table.cols.map(c=>(c.label||'').trim().toLowerCase());

  function mapCols(labels) {
    return {
      nome:  labels.findIndex(c=>/\bnome\b/.test(c)),
      tel:   labels.findIndex(c=>/tel[ef]/.test(c)),
      email: labels.findIndex(c=>/e?-?mail/.test(c)),
      val:   labels.findIndex(c=>/valor/.test(c)),
      prod:  labels.findIndex(c=>/produto/.test(c)),
      canal: labels.findIndex(c=>/\bcanal\b/.test(c)),
      acao:  labels.findIndex(c=>/levou|a[çc][aã]o/.test(c)),
    };
  }

  let colMap = mapCols(colLabels);

  // If headers not in cols metadata, try first data row
  if(colMap.nome < 0 && json.table.rows.length > 0) {
    const firstCells = json.table.rows[0].c.map(c=>c?String(c.v||c.f||'').trim().toLowerCase():'');
    if(firstCells.some(c=>/\bnome\b/.test(c))) {
      colMap = mapCols(firstCells);
    }
  }

  const getCell = (row, idx) => {
    if(idx < 0 || idx >= row.c.length || !row.c[idx]) return '';
    return String(row.c[idx].f || row.c[idx].v || '').trim();
  };

  const SKIP = /^(nome|exemplo\s*\d*|total|\d+)$/i;
  const rows = [];

  json.table.rows.forEach(row => {
    if(!row.c || !row.c.length) return;
    const nome   = colMap.nome  >= 0 ? getCell(row, colMap.nome)  : '';
    const valStr = colMap.val   >= 0 ? getCell(row, colMap.val)   : '';
    const val    = parseMoney(valStr);
    if(!nome || SKIP.test(nome.trim()) || val <= 0) return;
    rows.push({
      nome:  nome.trim(),
      tel:   colMap.tel   >= 0 ? getCell(row, colMap.tel)   : '',
      email: colMap.email >= 0 ? getCell(row, colMap.email) : '',
      val,
      prod:  (colMap.prod  >= 0 ? getCell(row, colMap.prod).trim()  : '') || 'Não informado',
      canal: (colMap.canal >= 0 ? getCell(row, colMap.canal).trim() : '') || 'Não informado',
      acao:  colMap.acao  >= 0 ? getCell(row, colMap.acao)  : '',
    });
  });
  return rows;
}


async function loadAll() {
  const btn = document.getElementById('btn-refresh');

  const meses = getMesesSelecionados();
  const tarefas = [];
  VENDEDORES.forEach(vd => {
    if(!allData[vd.nome]) allData[vd.nome] = {};
    meses.forEach(mes => {
      tarefas.push((async () => {
        try {
          allData[vd.nome][mes] = await fetchSheet(vd, mes);
        } catch(e) {
          console.warn('Erro ao carregar', vd.nome, mes, e);
          allData[vd.nome][mes] = [];
        }
      })());
    });
  });

  await Promise.all(tarefas);
  document.getElementById('last-sync').textContent = 'Sync: ' + new Date().toLocaleTimeString('pt-BR');
  btn.classList.remove('spinning');
  renderAll();
}

    return;
  }

  if(!rows.length) {
    document.getElementById('pg-dashboard').innerHTML = emptyHTML('📊','Sem dados para ' + labelMeses(),'Verifique se as planilhas estão compartilhadas e têm dados para esse período.');
    return;

  const rec = rows.reduce((s,r) => s+r.val, 0);
  const nClientes = rows.length;
  const tk = nClientes ? rec/nClientes : 0;
  const pctMeta = Math.min(Math.round(rec/meta*100), 100);
  const metaColor = pctMeta >= 100 ? 'green' : pctMeta >= 60 ? 'yellow' : 'red';
  const metaBadgeClass = pctMeta >= 100 ? 'b-green' : pctMeta >= 60 ? 'b-yellow' : 'b-red';

  // canal breakdown
  const canais = {};
  rows.forEach(r => { canais[r.canal] = (canais[r.canal]||0)+r.val; });
  const topCanal = Object.entries(canais).sort((a,b)=>b[1]-a[1])[0]||['—',0];

  const diasMes = 30;
  const metaSem = meta / 4;

  const metaInputHTML = mesUnico
    ? `<div class="meta-input-row">
        <label>Meta R$</label>
        <input type="number" id="db-meta-input" value="${meta}" oninput="saveMeta(this.value)">
      </div>`
    : `<div class="meta-sub" style="margin-top:.75rem;">Selecione um único mês pra editar a meta.</div>`;

  const sprintsCardHTML = mesUnico
    ? `<div class="section-title">Breakdown Semanal</div>
       <div class="card">
         <div class="card-title">Sprints — Meta semanal R$${fmt(metaSem)}</div>
         <div id="db-sprints"></div>
       </div>`
    : `<div class="section-title">Breakdown Semanal</div>
       <div class="card">
         <div class="meta-sub">Selecione um único mês pra ver o detalhamento semanal (sprints).</div>
       </div>`;

  document.getElementById('pg-dashboard').innerHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Receita Total</div>
        <div class="stat-value green">R$${fmtK(rec).replace('R$','')}</div>
        <div class="stat-sub">${labelMeses()} · ${vLabel}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Clientes</div>
        <div class="stat-value purple">${nClientes}</div>
        <div class="stat-sub">fechamentos no período</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ticket Médio</div>
        <div class="stat-value blue">R$${fmtK(tk).replace('R$','')}</div>
        <div class="stat-sub">por fechamento</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top Canal</div>
        <div class="stat-value yellow" style="font-size:1.1rem;margin-top:4px;">${topCanal[0]}</div>
        <div class="stat-sub">R$${fmtK(topCanal[1]).replace('R$','')} gerado</div>
      </div>
    </div>

    <div class="grid2" style="margin-bottom:1.2rem">
      <div class="card">
        <div class="card-title">Meta do Período</div>
        <div class="meta-header">
          <div class="meta-values">
            <strong>R$${fmt(rec)}</strong> <span style="opacity:.5">/</span> R$${fmt(meta)}
          </div>
          <span class="badge ${metaBadgeClass}">${pctMeta}%</span>
        </div>
        <div class="pb"><div class="pf" id="db-metabar" style="width:0%;background:var(--${metaColor === 'green' ? 'green' : metaColor === 'yellow' ? 'yellow' : 'red'});"></div></div>
        <div class="meta-sub">${pctMeta >= 100 ? '✓ Meta atingida!' : 'Faltam R$' + fmt(meta - rec)}</div>

  setTimeout(() => {
    const bar = document.getElementById('db-metabar');
    if(bar) bar.style.width = pctMeta + '%';
  }, 100);

  // funil
  const canal_entries = Object.entries(canais).sort((a,b)=>b[1]-a[1]);
  const maxVal = canal_entries[0] ? canal_entries[0][1] : 1;
  const colors = ['#9B6BFF','#4ade80','#60a5fa','#fbbf24','#f87171','#f472b6'];
  document.getElementById('db-funil').innerHTML = canal_entries.slice(0,4).map(([canal,val],i) => `
    <div class="funil-row">
      <span class="funil-lbl">${canal}</span>
      <div class="funil-wrap">
        <div class="funil-fill" style="width:${Math.max(Math.round(val/maxVal*100),8)}%;background:${colors[i]}33;color:${colors[i]};border:1px solid ${colors[i]}55;">
          ${nClientes ? rows.filter(r=>r.canal===canal).length : 0}
        </div>
      </div>
      <span class="funil-pct">${Math.round(val/rec*100)}%</span>
    </div>`).join('');

  // sprints com valores manuais (cards colapsáveis) — só faz sentido pra um único mês
  if(!mesUnico) return;
  const mes = mesUnico;
  const v = getVendedor();
  const vendedoresShow = v === 'all' ? VENDEDORES : [VENDEDORES[parseInt(v)]];
  const sprintLabels = ['Sem 1 (1–7)','Sem 2 (8–14)','Sem 3 (15–21)','Sem 4 (22–30)'];
  document.getElementById('db-sprints').innerHTML = vendedoresShow.map(vd => {
    const vMeta = METAS[vd.nome][mes] || 50000;
    const vMetaSem = vMeta / 4;
    const spVals = distribuitSprints(vd.nome, mes);
    const spTotal = spVals.reduce((s,x)=>s+x,0);
    const key = 'db-' + vd.nome.replace(/\s+/g,'_');
    const collapsed = vendedoresShow.length > 1 && isSprintCollapsed(key);
    const body = `
      ${sprintLabels.map((lbl,i) => {
        const sv = spVals[i];
        const sp = Math.min(Math.round(sv/vMetaSem*100),100);
        const cl = sp>=100?'b-green':sp>=60?'b-yellow':'b-red';
        return `<div class="sprint-row" style="grid-template-columns:90px 1fr 140px 80px;margin-bottom:8px;">
          <span class="sprint-lbl">${lbl.split(' ').slice(0,2).join(' ')}</span>

            style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text);font-family:'DM Sans',sans-serif;width:130px;"
            oninput="saveSprint('${vd.nome}','${mes}',${i},this.value)">
          <span class="badge ${cl}" style="font-size:10px;">${sp>=100?'Atingida':sp>=60?'Andamento':'Atenção'}</span>
        </div>`;
      }).join('')}`;
    if(vendedoresShow.length === 1) {
      return `<div class="sprint-block">${body}</div>`;
    }
    return `<div class="sprint-block">
      <div class="sprint-block-header" id="sph-${key}" onclick="toggleSprintCollapse('${key}')">
        <div class="sprint-block-header-left">
          <svg class="sprint-block-chevron${collapsed?' collapsed':''}" id="spc-${key}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
          <span class="sprint-block-title">${vd.nome}</span>
        </div>
        <span class="sprint-block-summary">R$${fmt(spTotal)} lançado</span>
      </div>
      <div class="sprint-block-body${collapsed?' collapsed':''}" id="spb-${key}">${body}</div>
    </div>`;
  }).join('');
}

function distribuitSprints(nomeVendedor, mes) {
  // Retorna os valores salvos, ou 0 se não preenchido
  const key = `sprints_${nomeVendedor}_${mes}`;
  try {
    const saved = localStorage.getItem(key);
    if(saved) return JSON.parse(saved);
  } catch(e) {}
  return [0, 0, 0, 0];
}

function saveSprint(nomeVendedor, mes, idx, val) {
  const key = `sprints_${nomeVendedor}_${mes}`;
  const vals = distribuitSprints(nomeVendedor, mes);
  vals[idx] = parseFloat(val) || 0;
  try { localStorage.setItem(key, JSON.stringify(vals)); } catch(e) {}
  renderMetas();
}

function saveMeta(val) {
  const v = getVendedor();
  const mesesSel = getMesesSelecionados();
  if(mesesSel.length !== 1) return; // edição só é permitida com um único mês selecionado
  const m = mesesSel[0];
  const numVal = parseFloat(val) || 50000;
  if(v === 'all') {
    VENDEDORES.forEach(vd => METAS[vd.nome][m] = numVal / VENDEDORES.length);
  } else {
    METAS[VENDEDORES[parseInt(v)].nome][m] = numVal;
  }
  saveMetas();
  renderDashboard();
}

function saveMetaVendedor(nome, mes, val) {

}

function renderClientes() {
  const rows = getData();

    return;
  }

  document.getElementById('pg-clientes').innerHTML = `
    <div class="search-row">

function filterClientes() {
  const q = document.getElementById('cli-search').value.toLowerCase();

}

function renderCliList(rows) {
  const list = document.getElementById('cli-list');
  if(!list) return;
  list.innerHTML = rows.map((r,i) => `
    <div class="cli-item" id="cli-${i}" onclick="showCliente(${i})">
      <div class="cli-name">${r.nome}</div>
      <div class="cli-sub">${r.canal} · ${r.prod}</div>
      <div class="cli-val">R$${fmt(r.val)}</div>
    </div>`).join('');
  if(rows.length) showCliente(0);
}

function showCliente(i) {
  document.querySelectorAll('.cli-item').forEach(el => el.classList.remove('active'));

          <div class="bar-head">
            <span style="display:flex;align-items:center;gap:6px;">${p} <span style="font-size:10px;color:var(--muted);">${rows.filter(r=>r.prod===p).length} clientes</span></span>
            <span class="bar-val">R$${fmt(v)}</span>
          </div>
          <div class="pb"><div class="pf" style="width:${Math.round(v/maxP*100)}%;background:${barColors[i%barColors.length]};"></div></div>
        </div>`).join('')}
      </div>
    </div>

    <div class="section-title">Clientes por Canal</div>
    <div class="card">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th>Canal</th><th>Qtd Clientes</th><th>Receita</th><th>Ticket Médio</th><th>% Receita</th><th></th>
          </tr></thead>
          <tbody>
            ${cEntries.map(([c,v],ci) => {
              const cnt = rows.filter(r=>r.canal===c).length;
              return `<tr class="clickable-row" onclick="openDrawer('canal','${c.replace(/'/g,"\\'")}')">
                <td><span class="badge b-purple">${c}</span></td>
                <td style="font-weight:600;">${cnt}</td>
                <td style="font-weight:600;color:var(--green);">R$${fmt(v)}</td>
                <td class="muted">R$${fmt(v/cnt)}</td>
                <td class="muted">${Math.round(v/rec*100)}%</td>
                <td style="color:var(--purple-bright);font-size:11px;">Ver →</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="section-title">Clientes por Produto</div>
    <div class="card">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th>Produto</th><th>Qtd Clientes</th><th>Receita</th><th>Ticket Médio</th><th>% Receita</th><th></th>
          </tr></thead>
          <tbody>
            ${pEntries.map(([p,v]) => {
              const cnt = rows.filter(r=>r.prod===p).length;
              return `<tr class="clickable-row" onclick="openDrawer('produto','${p.replace(/'/g,"\\'")}')">
                <td style="font-size:13px;">${p}</td>
                <td style="font-weight:600;">${cnt}</td>
                <td style="font-weight:600;color:var(--green);">R$${fmt(v)}</td>
                <td class="muted">R$${fmt(v/cnt)}</td>
                <td class="muted">${Math.round(v/rec*100)}%</td>
                <td style="color:var(--purple-bright);font-size:11px;">Ver →</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ── DRAWER ───────────────────────────────────────────────────────
let drawerExpanded = {};

function openDrawer(tipo, valor) {
  drawerExpanded = {};
  const rows = getData();
  const filtered = tipo === 'canal'
    ? rows.filter(r => r.canal === valor)
    : rows.filter(r => r.prod === valor);

  const total = filtered.reduce((s,r) => s+r.val, 0);
  const cnt = filtered.length;

  document.getElementById('drawer-title').textContent =
    (tipo === 'canal' ? '📡 Canal: ' : '📦 Produto: ') + valor;
  document.getElementById('drawer-sub').textContent =
    `${cnt} cliente${cnt!==1?'s':''} · Receita total: R$${fmt(total)} · Ticket médio: R$${fmt(cnt?total/cnt:0)}`;

  renderDrawerBody(filtered);

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function renderDrawerBody(filtered) {
  document.getElementById('drawer-body').innerHTML = filtered.length
    ? filtered.map((r, i) => {
        const isOpen = drawerExpanded[i];
        return `<div class="drawer-card" onclick="toggleDrawerCard(${i})">
          <div class="drawer-card-top">
            <span class="drawer-card-name">${r.nome}</span>
            <span class="drawer-card-val">R$${fmt(r.val)}</span>
          </div>
          <div class="drawer-card-row">
            ${r._vendedor ? `<span class="drawer-tag">👤 ${r._vendedor}</span>` : ''}
            <span class="drawer-tag">📡 ${r.canal}</span>
            <span class="drawer-tag">📦 ${r.prod}</span>
          </div>
          ${isOpen ? `
          <div class="drawer-expanded">
            ${r.tel ? `<div class="drawer-field"><div class="drawer-field-label">Telefone</div><div class="drawer-field-value">${r.tel}</div></div>` : ''}
            ${r.email ? `<div class="drawer-field"><div class="drawer-field-label">E-mail</div><div class="drawer-field-value" style="word-break:break-all;">${r.email}</div></div>` : ''}
            ${r.acao ? `<div class="drawer-field" style="grid-column:1/-1"><div class="drawer-field-label">Ação que levou ao fechamento</div><div class="drawer-field-value">${r.acao}</div></div>` : ''}
          </div>` : `<div style="font-size:10px;color:var(--purple-bright);margin-top:.5rem;">Clique para expandir detalhes</div>`}
        </div>`;
      }).join('')
    : `<div style="text-align:center;padding:3rem;color:var(--muted);font-size:13px;">Nenhum cliente encontrado</div>`;
}

function toggleDrawerCard(i) {
  drawerExpanded[i] = !drawerExpanded[i];
  // re-render body without closing drawer
  const rows = getData();
  const title = document.getElementById('drawer-title').textContent;
  const isByCanal = title.startsWith('📡');
  const valor = title.replace('📡 Canal: ','').replace('📦 Produto: ','');
  const filtered = isByCanal
    ? rows.filter(r => r.canal === valor)
    : rows.filter(r => r.prod === valor);
  renderDrawerBody(filtered);
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ── UTILS ────────────────────────────────────────────────────────
function emptyHTML(icon, title, sub) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
}
